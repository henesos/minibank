server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Rate limiting enabled — 100 requests/minute per IP
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            key-resolver: "#{@ipKeyResolver}"

  # Redis configuration for rate limiting
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

# Service URLs
services:
  user-service:
    url: http://localhost:8081
  account-service:
    url: http://localhost:8082
  transaction-service:
    url: http://localhost:8083
  notification-service:
    url: http://localhost:8084

# JWT Configuration — externalized for production security
jwt:
  secret: ${JWT_SECRET:minibank-dev-only-secret-key-not-for-production-min-256-bits-long}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
    instances:
      user-service:
        baseConfig: default
      account-service:
        baseConfig: default
      transaction-service:
        baseConfig: default
      notification-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
