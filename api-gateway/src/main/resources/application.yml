server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Global rate limiting configuration
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            key-resolver: "#{@ipKeyResolver}"
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2

      # Circuit Breaker configuration
      circuitbreaker:
        configs:
          default:
            slidingWindowSize: 10
            slidingWindowType: COUNT_BASED
            failureRateThreshold: 50
            waitDurationInOpenState: 10s
            permittedNumberOfCallsInHalfOpenState: 3

  # Redis configuration for rate limiting
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

# Service URLs
services:
  user-service:
    url: lb://user-service
  account-service:
    url: lb://account-service
  transaction-service:
    url: lb://transaction-service
  notification-service:
    url: lb://notification-service

# JWT Configuration
jwt:
  secret: minibank-super-secret-key-for-development-only-min-256-bits

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0

# Logging
logging:
  level:
    root: INFO
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    io.lettuce: WARN
