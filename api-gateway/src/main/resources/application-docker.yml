server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Rate limiting disabled for simplicity - enable when Redis is ready
      # default-filters:
      #   - name: RequestRateLimiter
      #     args:
      #       redis-rate-limiter.replenishRate: 100
      #       redis-rate-limiter.burstCapacity: 200
      #       key-resolver: "#{@ipKeyResolver}"

  # Redis configuration (optional for rate limiting)
  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

# Service URLs for Docker environment
services:
  user-service:
    url: http://user-service:8081
  account-service:
    url: http://account-service:8082
  transaction-service:
    url: http://transaction-service:8083
  notification-service:
    url: http://notification-service:8084

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
