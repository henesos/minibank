server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Rate limiting enabled — 100 requests/minute per IP
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            key-resolver: "#{@ipKeyResolver}"

  # Redis configuration for rate limiting
  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

# Service URLs for Docker environment
services:
  user-service:
    url: http://user-service:8081
  account-service:
    url: http://account-service:8082
  transaction-service:
    url: http://transaction-service:8083
  notification-service:
    url: http://notification-service:8084

# JWT Configuration — secret MUST be provided via environment variable
jwt:
  secret: ${JWT_SECRET}

# Internal Service Authentication — HMAC-based inter-service auth
internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}
    enabled: true
    token-ttl: 300000  # 5 minutes in milliseconds

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
    instances:
      user-service:
        baseConfig: default
      account-service:
        baseConfig: default
      transaction-service:
        baseConfig: default
      notification-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
