server:
  port: 0

spring:
  application:
    name: api-gateway-test

  cloud:
    gateway:
      # Disable rate limiting and other filters for tests
      default-filters: []

  # Disable Redis for tests
  data:
    redis:
      host: localhost
      port: 6379

# Service URLs (mock for tests)
services:
  user-service:
    url: http://localhost:8081
  account-service:
    url: http://localhost:8082
  transaction-service:
    url: http://localhost:8083
  notification-service:
    url: http://localhost:8084

# JWT Configuration
jwt:
  secret: minibank-super-secret-key-for-development-only-min-256-bits

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: WARN
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: WARN
    io.lettuce: WARN
    io.micrometer: WARN
