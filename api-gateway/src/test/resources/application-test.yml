server:
  port: 0

spring:
  application:
    name: api-gateway-test

  cloud:
    gateway:
      # Enable rate limiting for tests
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 10
            key-resolver: "#{@ipKeyResolver}"

  # Redis configuration for tests — host will be set dynamically
  data:
    redis:
      host: localhost
      port: 6379

  # Rate limiter configuration
  rate-limiter:
    enabled: true
    requests-per-minute: 60
    burst-capacity: 60

# Service URLs (mock for tests)
services:
  user-service:
    url: http://localhost:8081
  account-service:
    url: http://localhost:8082
  transaction-service:
    url: http://localhost:8083
  notification-service:
    url: http://localhost:8084

# JWT Configuration
jwt:
  secret: minibank-super-secret-key-for-development-only-min-256-bits

# Internal Service Authentication — disabled for unit tests
internal:
  auth:
    secret: minibank-internal-secret-key-for-development-min-256-bits
    enabled: false
    token-ttl: 300000

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false
  health:
    redis:
      enabled: false

# Logging
logging:
  level:
    root: WARN
    com.minibank.gateway: DEBUG
    org.springframework.cloud.gateway: WARN
    io.lettuce: WARN
    io.micrometer: WARN
