# Test configuration
spring:
  datasource:
    url: jdbc:tc:postgresql:15:///user_test_db
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-for-testing-minimum-256-bits-required
  expiration: 3600000
  refresh-expiration: 86400000

# Internal Service Authentication — disabled for unit tests
# Note: Secret must be >= 32 characters to pass @PostConstruct validation
internal:
  auth:
    enabled: false
    secret: dummy-secret-for-testing-must-be-32-chars-min

logging:
  level:
    com.minibank: DEBUG
