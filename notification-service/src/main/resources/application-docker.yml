server:
  port: 8084

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://postgres:5432/minibank_notification
    username: minibank
    password: minibank123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.minibank.transaction.saga,com.minibank.notification.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Redis configuration for idempotency tracking
  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

notification:
  email:
    enabled: true
    from: noreply@minibank.com
    mock: true
  sms:
    enabled: false
    mock: true
  push:
    enabled: false
    mock: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Internal Service Authentication — HMAC-based inter-service auth
internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}
    enabled: true
    token-ttl: 300000  # 5 minutes in milliseconds
