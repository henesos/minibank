server:
  port: 8084

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/minibank_notification
    username: ${DB_USERNAME:minibank}
    password: ${DB_PASSWORD:minibank123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: notification

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.minibank.transaction.saga,com.minibank.notification.dto"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 5000ms

# Notification Service Settings
notification:
  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM:noreply@minibank.com}
    # Mock email provider - in production, configure SMTP
    mock: true
  sms:
    enabled: ${SMS_ENABLED:false}
    mock: true
  push:
    enabled: ${PUSH_ENABLED:false}
    mock: true
  retry:
    max-attempts: 3
    delay-ms: 5000
  idempotency:
    ttl-hours: 24

# Kafka Topics
kafka:
  topics:
    transaction-events: transaction-events
    notification-events: notification-events

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    com.minibank.notification: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
