server:
  port: 0

spring:
  application:
    name: notification-service-test

  # Disable Kafka auto-configuration for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.kafka.annotation.KafkaBootstrapConfiguration

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Disable Redis for tests
  data:
    redis:
      repositories:
        enabled: false

# Notification Service Settings
notification:
  email:
    enabled: true
    from: test@minibank.com
    mock: true
  sms:
    enabled: false
    mock: true
  push:
    enabled: false
    mock: true
  retry:
    max-attempts: 2
    delay-ms: 1000

# Logging
logging:
  level:
    root: WARN
    com.minibank.notification: DEBUG
