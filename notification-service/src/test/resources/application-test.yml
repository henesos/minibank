server:
  port: 0

spring:
  application:
    name: notification-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: ""

  # Disable Kafka for tests
  kafka:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Notification Service Settings
notification:
  email:
    enabled: true
    from: test@minibank.com
    mock: true
  sms:
    enabled: false
    mock: true
  push:
    enabled: false
    mock: true
  retry:
    max-attempts: 2
    delay-ms: 1000

# Logging
logging:
  level:
    root: WARN
    com.minibank.notification: DEBUG

# Internal Service Authentication — disabled for unit tests
internal:
  auth:
    secret: minibank-internal-secret-key-for-development-min-256-bits
    enabled: false
    token-ttl: 300000
