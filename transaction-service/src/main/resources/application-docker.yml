# Docker Profile Configuration
server:
  port: 8083

spring:
  application:
    name: transaction-service
  
  datasource:
    url: jdbc:postgresql://transaction-db:5432/transaction_db
    username: minibank
    password: minibank123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: transaction-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.minibank: INFO
    org.hibernate.SQL: WARN

app:
  transaction:
    default-currency: TRY
    max-daily-transfer: 50000.00
    idempotency-ttl: 86400
  
  saga:
    retry-count: 3
    retry-delay-ms: 1000
    timeout-ms: 30000

# Internal Service Authentication — HMAC-based inter-service auth
internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}
    enabled: true
    token-ttl: 300000  # 5 minutes in milliseconds

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.minibank.transaction.controller
  paths-to-match: /api/v1/**
