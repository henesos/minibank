# Test configuration
spring:
  datasource:
    url: jdbc:tc:postgresql:15:///account_test_db
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9093

# Internal Service Authentication — disabled for unit tests
internal:
  auth:
    secret: minibank-internal-secret-key-for-development-min-256-bits
    enabled: false
    token-ttl: 300000

logging:
  level:
    com.minibank: DEBUG
